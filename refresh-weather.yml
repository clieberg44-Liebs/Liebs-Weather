name: Refresh Weather Data

on:
  schedule:
    # Every 15 minutes. Note: GitHub Actions cron often has 5–15 min drift.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "refresh"
        type: choice
        options:
          - refresh
          - backfill

# Only one run at a time, so we never race a commit
concurrency:
  group: refresh-weather
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet requests pandas openpyxl

      - name: Fetch from WeatherLink
        env:
          WEATHERLINK_API_KEY:    ${{ secrets.WEATHERLINK_API_KEY }}
          WEATHERLINK_API_SECRET: ${{ secrets.WEATHERLINK_API_SECRET }}
          WEATHERLINK_STATION_ID: ${{ secrets.WEATHERLINK_STATION_ID }}
          WEATHERLINK_TZ:         "America/Chicago"
          HISTORICAL_WORKBOOK:    "data/Weather_Data.xlsm"
        run: |
          MODE="${{ github.event.inputs.mode || 'refresh' }}"
          python scripts/fetch_weatherlink.py --mode "$MODE"

      - name: Commit updated data
        run: |
          git config user.name  "weather-bot"
          git config user.email "weather-bot@users.noreply.github.com"
          git add data/weather.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: refresh weather $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Retry once on conflict (other cron run happened concurrently)
            git pull --rebase --autostash || true
            git push
          fi
